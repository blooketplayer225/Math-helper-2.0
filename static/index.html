<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Google Classroom - Dashboard</title>
        <link rel="icon" href="https://ssl.gstatic.com/classroom/favicon.png" />
        
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet" />

        <style>
            body, html, #app {
                font-family: "Inter", sans-serif;
                width: 100vw;
                height: 100vh;
                margin: 0;
                padding: 0;
                background-color: #050505;
                overflow: hidden;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }

            /* Simple Stealth Button Style */
            .launch-btn {
                padding: 15px 30px;
                background: #1a1a1a;
                color: white;
                border: 1px solid #333;
                border-radius: 8px;
                cursor: pointer;
                font-family: inherit;
                transition: 0.3s;
            }

            .launch-btn:hover {
                background: #252525;
                border-color: #444;
            }
        </style>

        <script src="/baremux/index.js" defer></script>
        <script src="/scram/scramjet.all.js" defer></script>
        <script src="config.js" defer></script>
        <script src="store.js" defer></script>
        
        <script>
            // about:blank Cloaker Function
            function launchStealth() {
                const win = window.open();
                if (!win || win.closed) {
                    alert("Pop-up blocked! Please allow pop-ups to launch the proxy.");
                    return;
                }
                
                const doc = win.document;
                const iframe = doc.createElement('iframe');
                const style = iframe.style;

                doc.title = "Classes"; // Fake title for the new tab
                style.position = "fixed";
                style.top = "0";
                style.left = "0";
                style.bottom = "0";
                style.right = "0";
                style.width = "100%";
                style.height = "100%";
                style.border = "none";
                style.margin = "0";
                style.padding = "0";
                style.overflow = "hidden";
                style.backgroundColor = "#050505";

                // Point the iframe to your current deployment URL
                iframe.src = window.location.href;
                doc.body.appendChild(iframe);
                
                // Redirect original tab to a "safe" site
                window.location.replace("https://classroom.google.com");
            }
        </script>
    </head>

    <body>
        <div id="app">
            <button class="launch-btn" onclick="launchStealth()">Enter Dashboard</button>
        </div>

        <script src="ui.js" defer></script>
    </body>
</html>
